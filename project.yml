name: Skinmax
options:
  bundleIdPrefix: com.skinmax
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

targets:
  Skinmax:
    type: application
    platform: iOS
    sources:
      - path: Skinmax
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: Skinmax/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.skinmax.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Skinmax
    dependencies:
      - package: Supabase
      - package: Kingfisher

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: "8.0.0"
