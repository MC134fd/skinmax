<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Glowbite — 04 Scanner Neon</title>
  <defs>
    <radialGradient id="bgD" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#FF9B7D"/>
      <stop offset="60%" stop-color="#E55A3C"/>
      <stop offset="100%" stop-color="#8B2A0E"/>
    </radialGradient>
    <radialGradient id="haloD" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FFD3B8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FF7A5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="appleD" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFD3B8"/>
      <stop offset="50%" stop-color="#FF9B7D"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="leafD" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#9BD89F"/>
      <stop offset="100%" stop-color="#4FA055"/>
    </radialGradient>
    <filter id="glowD" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clipD"><rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/></clipPath>
  </defs>

  <g clip-path="url(#clipD)">
    <rect width="1024" height="1024" fill="url(#bgD)"/>
    <circle cx="512" cy="540" r="420" fill="url(#haloD)"/>

    <!-- Stem -->
    <path d="M508 290 q-6 -36 18 -64 q22 -20 46 -16 q-2 24 -20 46 q-20 22 -44 34 z" fill="#3A2418"/>
    <!-- Leaf -->
    <path d="M520 288 q56 -84 168 -64 q-12 102 -112 122 q-46 8 -56 -58 z" fill="url(#leafD)"/>

    <!-- Apple body -->
    <path d="M512 320 C 330 320, 220 450, 220 620 C 220 800, 350 905, 500 905 C 540 905, 575 898, 605 883 C 595 865, 588 840, 588 815 C 588 760, 632 722, 685 722 C 715 722, 740 734, 758 752 C 800 695, 814 630, 814 575 C 814 435, 712 320, 540 320 Z" fill="url(#appleD)"/>

    <!-- Highlight -->
    <ellipse cx="380" cy="470" rx="96" ry="148" fill="#FFD3B8" opacity="0.5" transform="rotate(-22 380 470)"/>
    <ellipse cx="350" cy="458" rx="32" ry="68" fill="#FFF8E8" opacity="0.8" transform="rotate(-22 350 458)"/>

    <!-- Blush -->
    <ellipse cx="380" cy="670" rx="48" ry="28" fill="#FF7A5C" opacity="0.6"/>
    <ellipse cx="640" cy="670" rx="48" ry="28" fill="#FF7A5C" opacity="0.5"/>

    <!-- Eyes -->
    <path d="M370 590 Q 395 565, 420 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M600 590 Q 625 565, 650 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M470 710 Q 510 730, 545 710" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Neon-glow scanner corners -->
    <g filter="url(#glowD)">
      <g stroke="#FFF8E8" stroke-width="18" stroke-linecap="round" fill="none">
        <path d="M140 240 L 140 140 L 240 140"/>
        <path d="M784 140 L 884 140 L 884 240"/>
        <path d="M140 784 L 140 884 L 240 884"/>
        <path d="M884 784 L 884 884 L 784 884"/>
      </g>
    </g>
    <!-- Crisp inner stroke on top -->
    <g stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" fill="none">
      <path d="M140 240 L 140 140 L 240 140"/>
      <path d="M784 140 L 884 140 L 884 240"/>
      <path d="M140 784 L 140 884 L 240 884"/>
      <path d="M884 784 L 884 884 L 784 884"/>
    </g>
  </g>
</svg>
