<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Glowbite — 05 Scanner + Score Ring</title>
  <defs>
    <radialGradient id="bgE" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#FFD3B8"/>
      <stop offset="55%" stop-color="#FFB89E"/>
      <stop offset="100%" stop-color="#FF7A5C"/>
    </radialGradient>
    <radialGradient id="haloE" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#FFD3B8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF7A5C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8"/>
      <stop offset="50%" stop-color="#FFD3B8"/>
      <stop offset="100%" stop-color="#FFB89E"/>
    </linearGradient>
    <radialGradient id="appleE" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFB89E"/>
      <stop offset="50%" stop-color="#FF7A5C"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="leafE" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#9BD89F"/>
      <stop offset="100%" stop-color="#4FA055"/>
    </radialGradient>
    <clipPath id="clipE"><rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/></clipPath>
  </defs>

  <g clip-path="url(#clipE)">
    <rect width="1024" height="1024" fill="url(#bgE)"/>
    <circle cx="512" cy="540" r="450" fill="url(#haloE)"/>

    <!-- Score ring -->
    <circle cx="512" cy="540" r="360" stroke="#FFF8E8" stroke-width="22" fill="none" opacity="0.25"/>
    <circle cx="512" cy="540" r="360" stroke="url(#ringE)" stroke-width="26" fill="none"
            stroke-linecap="round" stroke-dasharray="1920 2262"
            transform="rotate(-90 512 540)"/>

    <!-- Stem -->
    <path d="M508 322 q-6 -32 14 -54 q20 -18 42 -14 q-2 22 -18 42 q-20 20 -38 26 z" fill="#5C3920"/>
    <!-- Leaf -->
    <path d="M520 320 q50 -74 154 -58 q-10 94 -104 114 q-42 8 -50 -56 z" fill="url(#leafE)"/>

    <!-- Apple (slightly smaller to live inside ring) -->
    <path d="M512 352 C 352 352, 258 470, 258 628 C 258 790, 376 882, 510 882 C 544 882, 574 876, 600 862 C 592 844, 584 820, 584 796 C 584 744, 622 708, 670 708 C 696 708, 718 720, 734 738 C 770 684, 782 622, 782 568 C 782 436, 684 352, 540 352 Z" fill="url(#appleE)"/>

    <!-- Highlight -->
    <ellipse cx="388" cy="486" rx="78" ry="122" fill="#FFD3B8" opacity="0.55" transform="rotate(-22 388 486)"/>
    <ellipse cx="362" cy="476" rx="28" ry="58" fill="#FFF8E8" opacity="0.85" transform="rotate(-22 362 476)"/>

    <!-- Cheeks -->
    <ellipse cx="400" cy="668" rx="42" ry="24" fill="#FFB89E" opacity="0.7"/>
    <ellipse cx="622" cy="668" rx="42" ry="24" fill="#FFB89E" opacity="0.55"/>

    <!-- Eyes -->
    <path d="M392 594 Q 415 572, 438 594" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>
    <path d="M584 594 Q 607 572, 630 594" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M478 700 Q 510 716, 544 700" stroke="#2B1F1A" stroke-width="10" fill="none" stroke-linecap="round"/>

    <!-- Scanner corners (medium weight, cream) -->
    <g stroke="#FFF8E8" stroke-width="16" stroke-linecap="round" fill="none">
      <path d="M140 240 L 140 140 L 240 140"/>
      <path d="M784 140 L 884 140 L 884 240"/>
      <path d="M140 784 L 140 884 L 240 884"/>
      <path d="M884 784 L 884 884 L 784 884"/>
    </g>
  </g>
</svg>
