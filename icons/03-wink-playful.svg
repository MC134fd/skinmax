<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Glowbite — 03 Scanner Thin + Ticks</title>
  <defs>
    <radialGradient id="bgC" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#FFD3B8"/>
      <stop offset="55%" stop-color="#FFB89E"/>
      <stop offset="100%" stop-color="#FF7A5C"/>
    </radialGradient>
    <radialGradient id="haloC" cx="50%" cy="55%" r="58%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFD3B8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF7A5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="appleC" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFB89E"/>
      <stop offset="50%" stop-color="#FF7A5C"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="leafC" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#9BD89F"/>
      <stop offset="100%" stop-color="#4FA055"/>
    </radialGradient>
    <clipPath id="clipC"><rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/></clipPath>
  </defs>

  <g clip-path="url(#clipC)">
    <rect width="1024" height="1024" fill="url(#bgC)"/>
    <circle cx="512" cy="540" r="450" fill="url(#haloC)"/>
    <circle cx="512" cy="540" r="310" fill="#FFF8E8" opacity="0.18"/>

    <!-- Stem -->
    <path d="M508 290 q-6 -36 18 -64 q22 -20 46 -16 q-2 24 -20 46 q-20 22 -44 34 z" fill="#5C3920"/>
    <!-- Leaf -->
    <path d="M520 288 q56 -84 168 -64 q-12 102 -112 122 q-46 8 -56 -58 z" fill="url(#leafC)"/>

    <!-- Apple -->
    <path d="M512 320 C 330 320, 220 450, 220 620 C 220 800, 350 905, 500 905 C 540 905, 575 898, 605 883 C 595 865, 588 840, 588 815 C 588 760, 632 722, 685 722 C 715 722, 740 734, 758 752 C 800 695, 814 630, 814 575 C 814 435, 712 320, 540 320 Z" fill="url(#appleC)"/>

    <!-- Highlight -->
    <ellipse cx="380" cy="470" rx="90" ry="140" fill="#FFD3B8" opacity="0.55" transform="rotate(-22 380 470)"/>
    <ellipse cx="350" cy="458" rx="32" ry="66" fill="#FFF8E8" opacity="0.85" transform="rotate(-22 350 458)"/>

    <!-- Cheeks -->
    <ellipse cx="380" cy="670" rx="48" ry="28" fill="#FFB89E" opacity="0.7"/>
    <ellipse cx="640" cy="670" rx="48" ry="28" fill="#FFB89E" opacity="0.55"/>

    <!-- Eyes -->
    <path d="M370 590 Q 395 565, 420 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M600 590 Q 625 565, 650 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M470 710 Q 510 730, 545 710" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Thin scanner brackets with tick marks (camera reticle style) -->
    <g stroke="#FFF8E8" stroke-width="10" stroke-linecap="round" fill="none">
      <!-- Top-left -->
      <path d="M140 260 L 140 140 L 260 140"/>
      <!-- Tiny tick marks near corner -->
      <line x1="200" y1="140" x2="200" y2="164"/>
      <line x1="140" y1="200" x2="164" y2="200"/>
      <!-- Top-right -->
      <path d="M764 140 L 884 140 L 884 260"/>
      <line x1="824" y1="140" x2="824" y2="164"/>
      <line x1="884" y1="200" x2="860" y2="200"/>
      <!-- Bottom-left -->
      <path d="M140 764 L 140 884 L 260 884"/>
      <line x1="200" y1="884" x2="200" y2="860"/>
      <line x1="140" y1="824" x2="164" y2="824"/>
      <!-- Bottom-right -->
      <path d="M884 764 L 884 884 L 764 884"/>
      <line x1="824" y1="884" x2="824" y2="860"/>
      <line x1="884" y1="824" x2="860" y2="824"/>
    </g>

    <!-- Tiny center crosshair / reticle marks -->
    <g stroke="#FFF8E8" stroke-width="4" stroke-linecap="round" opacity="0.55">
      <line x1="512" y1="162" x2="512" y2="196"/>
      <line x1="512" y1="828" x2="512" y2="862"/>
      <line x1="162" y1="512" x2="196" y2="512"/>
      <line x1="828" y1="512" x2="862" y2="512"/>
    </g>
  </g>
</svg>
