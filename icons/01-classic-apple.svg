<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Glowbite — 01 Scanner Classic</title>
  <defs>
    <radialGradient id="bgA" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#FFD3B8"/>
      <stop offset="55%" stop-color="#FFB89E"/>
      <stop offset="100%" stop-color="#FF7A5C"/>
    </radialGradient>
    <radialGradient id="haloA" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#FFD3B8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF7A5C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="appleA" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFB89E"/>
      <stop offset="50%" stop-color="#FF7A5C"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="leafA" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#9BD89F"/>
      <stop offset="100%" stop-color="#4FA055"/>
    </radialGradient>
    <clipPath id="clipA"><rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/></clipPath>
  </defs>

  <g clip-path="url(#clipA)">
    <rect width="1024" height="1024" fill="url(#bgA)"/>
    <circle cx="512" cy="540" r="450" fill="url(#haloA)"/>
    <circle cx="512" cy="540" r="320" fill="#FFF8E8" opacity="0.18"/>

    <!-- Stem -->
    <path d="M508 290 q-6 -36 18 -64 q22 -20 46 -16 q-2 24 -20 46 q-20 22 -44 34 z" fill="#5C3920"/>
    <!-- Leaf -->
    <path d="M520 288 q56 -84 168 -64 q-12 102 -112 122 q-46 8 -56 -58 z" fill="url(#leafA)"/>

    <!-- Apple -->
    <path d="M512 320 C 330 320, 220 450, 220 620 C 220 800, 350 905, 500 905 C 540 905, 575 898, 605 883 C 595 865, 588 840, 588 815 C 588 760, 632 722, 685 722 C 715 722, 740 734, 758 752 C 800 695, 814 630, 814 575 C 814 435, 712 320, 540 320 Z" fill="url(#appleA)"/>

    <!-- Highlight -->
    <ellipse cx="380" cy="470" rx="90" ry="140" fill="#FFD3B8" opacity="0.55" transform="rotate(-22 380 470)"/>
    <ellipse cx="352" cy="460" rx="32" ry="66" fill="#FFF8E8" opacity="0.85" transform="rotate(-22 352 460)"/>

    <!-- Cheeks -->
    <ellipse cx="380" cy="670" rx="48" ry="28" fill="#FFB89E" opacity="0.7"/>
    <ellipse cx="640" cy="670" rx="48" ry="28" fill="#FFB89E" opacity="0.55"/>

    <!-- Blissful closed eyes -->
    <path d="M370 590 Q 395 565, 420 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M600 590 Q 625 565, 650 590" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M470 710 Q 510 730, 545 710" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Scanner corner brackets (thick, solid, cream) -->
    <g stroke="#FFF8E8" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.95">
      <!-- Top-left -->
      <path d="M130 230 L 130 130 L 230 130"/>
      <!-- Top-right -->
      <path d="M794 130 L 894 130 L 894 230"/>
      <!-- Bottom-left -->
      <path d="M130 794 L 130 894 L 230 894"/>
      <!-- Bottom-right -->
      <path d="M894 794 L 894 894 L 794 894"/>
    </g>

    <!-- Supporting sparkles -->
    <g fill="#FFF8E8">
      <path d="M180 480 l10 26 l26 10 l-26 10 l-10 26 l-10 -26 l-26 -10 l26 -10 z" opacity="0.9"/>
      <path d="M830 490 l11 28 l28 11 l-28 11 l-11 28 l-11 -28 l-28 -11 l28 -11 z" opacity="0.9"/>
    </g>
  </g>
</svg>
