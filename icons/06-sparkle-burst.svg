<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <title>Glowbite — 06 Scanner Dashed + Starburst</title>
  <defs>
    <radialGradient id="bgF" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#FFB89E"/>
      <stop offset="55%" stop-color="#FF8E70"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="appleF" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#FFD3B8"/>
      <stop offset="50%" stop-color="#FF9B7D"/>
      <stop offset="100%" stop-color="#D8512F"/>
    </radialGradient>
    <radialGradient id="leafF" cx="35%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#9BD89F"/>
      <stop offset="100%" stop-color="#4FA055"/>
    </radialGradient>
    <linearGradient id="rayF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#FFF8E8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="clipF"><rect x="0" y="0" width="1024" height="1024" rx="225" ry="225"/></clipPath>
  </defs>

  <g clip-path="url(#clipF)">
    <rect width="1024" height="1024" fill="url(#bgF)"/>

    <!-- Starburst behind apple -->
    <g transform="translate(512 540)">
      <g fill="url(#rayF)">
        <polygon points="0,-420 24,-90 -24,-90"/>
        <polygon points="0,420 24,90 -24,90" transform="rotate(180)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(45)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(-45)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(90)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(-90)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(135)"/>
        <polygon points="0,-420 24,-90 -24,-90" transform="rotate(-135)"/>
      </g>
    </g>
    <circle cx="512" cy="540" r="290" fill="#FFF8E8" opacity="0.2"/>

    <!-- Stem -->
    <path d="M508 310 q-7 -34 16 -58 q22 -20 46 -16 q-2 22 -20 44 q-20 20 -42 30 z" fill="#5C3920"/>
    <!-- Leaf -->
    <path d="M520 308 q56 -82 168 -64 q-12 100 -112 120 q-46 8 -56 -56 z" fill="url(#leafF)"/>

    <!-- Apple -->
    <path d="M512 340 C 350 340, 252 462, 252 612 C 252 772, 376 868, 510 868 C 542 868, 572 862, 596 848 C 588 830, 580 808, 580 782 C 580 730, 620 692, 668 692 C 692 692, 712 700, 728 716 C 766 660, 778 598, 778 552 C 778 432, 686 340, 540 340 Z" fill="url(#appleF)"/>

    <!-- Highlight -->
    <ellipse cx="380" cy="474" rx="72" ry="112" fill="#FFD3B8" opacity="0.55" transform="rotate(-25 380 474)"/>
    <ellipse cx="355" cy="464" rx="26" ry="54" fill="#FFF8E8" opacity="0.85" transform="rotate(-25 355 464)"/>

    <!-- Cheeks -->
    <ellipse cx="396" cy="656" rx="48" ry="28" fill="#FF7A5C" opacity="0.6"/>
    <ellipse cx="616" cy="656" rx="48" ry="28" fill="#FF7A5C" opacity="0.5"/>

    <!-- Eyes -->
    <path d="M374 586 Q 399 561, 424 586" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M600 586 Q 625 561, 650 586" stroke="#2B1F1A" stroke-width="12" fill="none" stroke-linecap="round"/>

    <!-- Smile -->
    <path d="M468 700 Q 510 722, 550 700" stroke="#2B1F1A" stroke-width="11" fill="none" stroke-linecap="round"/>

    <!-- Dashed scanner corners (like face-scan oval in-app) -->
    <g stroke="#FFF8E8" stroke-width="14" stroke-linecap="round" stroke-dasharray="28 18" fill="none">
      <path d="M140 250 L 140 140 L 250 140"/>
      <path d="M774 140 L 884 140 L 884 250"/>
      <path d="M140 774 L 140 884 L 250 884"/>
      <path d="M884 774 L 884 884 L 774 884"/>
    </g>
  </g>
</svg>
